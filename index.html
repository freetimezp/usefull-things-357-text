<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!--=============== REMIXICONS ===============-->
        <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet" />

        <link rel="stylesheet" href="./assets/css/style.css" />
        <title>Project</title>
    </head>

    <body>
        <div class="app">
            <div class="bg">
                <video class="bg-video" autoplay muted loop playsinline>
                    <source src="./assets/videos/bg.mp4" type="video/mp4" />
                </video>
            </div>

            <div class="bg-overlay"></div>
            <div class="scanline"></div>
            <div class="noise"></div>
            <div class="vignette"></div>
            <div class="light"></div>

            <!--=============== FLYING LETTERS ===============-->
            <div class="letters">
                <span class="letter" style="top: 5%; left: 5%">F</span>
                <span class="letter" style="top: 55%; left: 70%">A</span>
                <span class="letter" style="top: 35%; left: 35%">L</span>
                <span class="letter" style="top: 70%; left: 15%">L</span>
                <span class="letter" style="top: 15%; left: 80%">O</span>
                <span class="letter" style="top: 45%; left: 50%">U</span>
                <span class="letter" style="top: 78%; left: 78%">T</span>
            </div>

            <!--=============== HEADER ===============-->
            <header class="header">
                <div class="logo-small">WASTELAND</div>

                <nav>
                    <ul class="menu">
                        <li><a href="#">Home</a></li>
                        <li><a href="#">Vault</a></li>
                        <li><a href="#">Archive</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </nav>
            </header>

            <!--=============== HERO ===============-->
            <section class="hero">
                <div class="hero-content">
                    <h1 class="main-title">
                        <span class="line">FALLOUT</span>
                        <span class="line">NEW SEASON</span>
                    </h1>

                    <p class="description">
                        A cinematic wasteland-inspired interface with animated typography, floating letters, atmospheric
                        overlays, glitch reveal transitions, and immersive GSAP motion interactions.
                    </p>

                    <div class="buttons">
                        <a href="#" class="btn btn-primary">Enter Vault</a>
                        <a href="#" class="btn">Explore World</a>
                    </div>
                </div>
            </section>

            <!--=============== REVEAL SCREEN ===============-->
            <div class="reveal-overlay">
                <div class="reveal-text">Fallout</div>
            </div>
        </div>

        <!--=============== GSAP ===============-->
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/SplitText.min.js"></script>

        <script src="./assets/js/main.js"></script>
    </body>
</html>
